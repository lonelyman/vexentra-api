services:
   vexentra-pgsql:
      image: postgres:18-alpine # ขยับขึ้นมาเป็นตัวล่าสุดเพื่อ Performance สูงสุด
      container_name: vexentra_pgsql
      environment:
         POSTGRES_USER: ${POSTGRES_PRIMARY_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PRIMARY_PASSWORD}
         POSTGRES_DB: ${POSTGRES_PRIMARY_NAME}
      ports:
         - "${POSTGRES_EXTERNAL_PORT}:5432"
      volumes:
         - vexentra_pg_data:/var/lib/postgresql/data # แนะนำให้ใช้ Named Volume เพื่อความคงทนของข้อมูล
      healthcheck:
         test:
            [
               "CMD-SHELL",
               "pg_isready -U ${POSTGRES_PRIMARY_USER} -d ${POSTGRES_PRIMARY_NAME}",
            ]
         interval: 5s
         timeout: 5s
         retries: 5

   vexentra-redis:
      image: redis:7.4-alpine # ใช้ตัวที่เสถียรและเร็วล่าสุด
      container_name: vexentra_redis
      command: redis-server --requirepass ${REDIS_PASSWORD}
      ports:
         - "${REDIS_EXTERNAL_PORT}:6379"

   api:
      build: .
      container_name: vexentra_api
      ports:
         - "${API_PORT}:${API_PORT}"
      volumes:
         - .:/app
      environment:
         - API_PORT=${API_PORT}
      env_file:
         - .env
      depends_on:
         vexentra-pgsql:
            condition: service_healthy
         vexentra-redis:
            condition: service_started

volumes:
   vexentra_pg_data: # ประกาศ Named Volume สำหรับ PostgreSQL
